<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личные Финансы | Pro Version</title>
    
    <!-- Подключаем Chart.js для графиков -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Подключаем иконки Phosphor -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* --- CSS VARIABLES & RESET --- */
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-sec: #6b7280;
            --border: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        /* --- LAYOUT --- */
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .balance-box {
            text-align: right;
        }

        .balance-box .label {
            display: block;
            color: var(--text-sec);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .balance-box h2 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-main);
        }

        /* --- STATS GRID --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .stat-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 6px solid transparent;
            transition: transform 0.2s;
        }

        .stat-card:hover { transform: translateY(-2px); }
        .stat-card.income { border-left-color: var(--success); }
        .stat-card.expense { border-left-color: var(--danger); }
        .stat-card.total { border-left-color: var(--primary); }

        .stat-info { display: flex; flex-direction: column; }
        .stat-title { color: var(--text-sec); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; }
        .stat-value { font-size: 1.8rem; font-weight: 700; margin-top: 5px; }
        .stat-icon { font-size: 2.5rem; color: var(--text-sec); opacity: 0.2; }

        /* --- MAIN CONTENT GRID --- */
        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
            .balance-box { text-align: left; }
            header { flex-direction: column; align-items: flex-start; }
        }

        /* --- FORM --- */
        .form-control { margin-bottom: 15px; }
        .form-row { display: flex; gap: 15px; }
        .form-row .form-control { flex: 1; }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-sec);
            font-size: 0.9rem;
            font-weight: 500;
        }

        input, select {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 15px;
            width: 100%;
            font-size: 1rem;
            transition: all 0.2s;
            background: #fff;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            padding: 14px;
            width: 100%;
            transition: background 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn:hover { background-color: var(--primary-hover); }

        /* --- LIST --- */
        .list {
            list-style: none;
            max-height: 450px;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* Custom Scrollbar */
        .list::-webkit-scrollbar { width: 6px; }
        .list::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

        .list li {
            background: #fff;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            position: relative;
            overflow: hidden;
        }

        .list li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 5px;
        }

        .list li.plus::before { background-color: var(--success); }
        .list li.minus::before { background-color: var(--danger); }

        .transaction-info { display: flex; flex-direction: column; }
        .transaction-cat { font-size: 0.75rem; color: var(--text-sec); }
        
        .delete-btn {
            background: #fee2e2;
            color: var(--danger);
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            opacity: 0;
            transition: all 0.2s;
            margin-left: 10px;
        }

        .list li:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { background: var(--danger); color: white; }

        /* --- CHART --- */
        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        h3 { margin-bottom: 20px; font-size: 1.2rem; color: var(--text-main); }
    </style>
</head>
<body>

    <div class="container">
        <!-- HEADER -->
        <header>
            <div>
                <h1>Мои Финансы</h1>
                <p style="color: var(--text-sec)">Панель управления личным бюджетом</p>
            </div>
            <div class="balance-box">
                <span class="label">Текущий баланс</span>
                <h2 id="balance">0.00 ₽</h2>
            </div>
        </header>

        <!-- STATS -->
        <div class="stats-grid">
            <div class="card stat-card income">
                <div class="stat-info">
                    <span class="stat-title">Доходы</span>
                    <span class="stat-value" id="money-plus">+0.00 ₽</span>
                </div>
                <i class="ph ph-trend-up stat-icon"></i>
            </div>
            <div class="card stat-card expense">
                <div class="stat-info">
                    <span class="stat-title">Расходы</span>
                    <span class="stat-value" id="money-minus">-0.00 ₽</span>
                </div>
                <i class="ph ph-trend-down stat-icon"></i>
            </div>
            <div class="card stat-card total">
                <div class="stat-info">
                    <span class="stat-title">Всего операций</span>
                    <span class="stat-value" id="transaction-count">0</span>
                </div>
                <i class="ph ph-list-statistics stat-icon"></i>
            </div>
        </div>

        <!-- MAIN GRID -->
        <div class="main-grid">
            <!-- LEFT COLUMN -->
            <div class="left-column">
                <!-- FORM -->
                <div class="card" style="margin-bottom: 20px;">
                    <h3>Добавить операцию</h3>
                    <form id="form">
                        <div class="form-control">
                            <label for="text">Описание</label>
                            <input type="text" id="text" placeholder="Например: Продукты, Зарплата..." required>
                        </div>
                        <div class="form-row">
                            <div class="form-control">
                                <label for="amount">Сумма</label>
                                <input type="number" id="amount" placeholder="-500 (расход) или 1000 (доход)" required>
                            </div>
                            <div class="form-control">
                                <label for="category">Категория</label>
                                <select id="category">
                                    <option value="Еда">🍔 Еда</option>
                                    <option value="Транспорт">🚗 Транспорт</option>
                                    <option value="Жилье">🏠 Жилье</option>
                                    <option value="Развлечения">🎬 Развлечения</option>
                                    <option value="Здоровье">💊 Здоровье</option>
                                    <option value="Зарплата">💰 Зарплата</option>
                                    <option value="Инвестиции">📈 Инвестиции</option>
                                    <option value="Другое">📦 Другое</option>
                                </select>
                            </div>
                        </div>
                        <button class="btn">
                            <i class="ph ph-plus-circle"></i> Добавить транзакцию
                        </button>
                    </form>
                </div>

                <!-- LIST -->
                <div class="card">
                    <h3>История операций</h3>
                    <ul id="list" class="list">
                        <!-- JS will populate this -->
                    </ul>
                </div>
            </div>

            <!-- RIGHT COLUMN (CHART) -->
            <div class="right-column">
                <div class="card" style="height: 100%;">
                    <h3>Структура расходов</h3>
                    <div class="chart-container">
                        <canvas id="expenseChart"></canvas>
                    </div>
                    <div id="chart-empty-msg" style="text-align: center; color: var(--text-sec); margin-top: 20px; display: none;">
                        Нет данных для отображения графика
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- DOM ELEMENTS ---
        const balanceEl = document.getElementById('balance');
        const moneyPlusEl = document.getElementById('money-plus');
        const moneyMinusEl = document.getElementById('money-minus');
        const listEl = document.getElementById('list');
        const formEl = document.getElementById('form');
        const textInput = document.getElementById('text');
        const amountInput = document.getElementById('amount');
        const categoryInput = document.getElementById('category');
        const countEl = document.getElementById('transaction-count');
        const chartEmptyMsg = document.getElementById('chart-empty-msg');

        // --- STATE ---
        const localStorageTransactions = JSON.parse(localStorage.getItem('transactions'));
        let transactions = localStorage.getItem('transactions') !== null ? localStorageTransactions : [];
        let expenseChartInstance = null;

        // --- FUNCTIONS ---

        // 1. Generate ID
        function generateID() {
            return Math.floor(Math.random() * 100000000);
        }

        // 2. Add Transaction
        function addTransaction(e) {
            e.preventDefault();

            if (textInput.value.trim() === '' || amountInput.value.trim() === '') {
                alert('Пожалуйста, заполните все поля');
                return;
            }

            const transaction = {
                id: generateID(),
                text: textInput.value,
                amount: +amountInput.value,
                category: categoryInput.value,
                date: new Date().toLocaleDateString('ru-RU')
            };

            transactions.push(transaction);
            updateLocalStorage();
            init();

            textInput.value = '';
            amountInput.value = '';
        }

        // 3. Add to DOM
        function addTransactionDOM(transaction) {
            const sign = transaction.amount < 0 ? '-' : '+';
            const item = document.createElement('li');

            item.classList.add(transaction.amount < 0 ? 'minus' : 'plus');

            item.innerHTML = `
                <div class="transaction-info">
                    <strong>${transaction.text}</strong>
                    <span class="transaction-cat">${transaction.category} • ${transaction.date}</span>
                </div>
                <div style="display:flex; align-items:center;">
                    <span style="font-weight:bold; margin-right:10px;">${sign}${Math.abs(transaction.amount)} ₽</span>
                    <button class="delete-btn" onclick="removeTransaction(${transaction.id})">
                        <i class="ph ph-trash"></i>
                    </button>
                </div>
            `;

            listEl.appendChild(item);
        }

        // 4. Update Values (Balance, Income, Expense)
        function updateValues() {
            const amounts = transactions.map(transaction => transaction.amount);

            const total = amounts.reduce((acc, item) => (acc += item), 0).toFixed(2);
            const income = amounts.filter(item => item > 0).reduce((acc, item) => (acc += item), 0).toFixed(2);
            const expense = (amounts.filter(item => item < 0).reduce((acc, item) => (acc += item), 0) * -1).toFixed(2);

            balanceEl.innerText = `${total} ₽`;
            moneyPlusEl.innerText = `+${income} ₽`;
            moneyMinusEl.innerText = `-${expense} ₽`;
            countEl.innerText = transactions.length;
        }

        // 5. Remove Transaction
        function removeTransaction(id) {
            transactions = transactions.filter(transaction => transaction.id !== id);
            updateLocalStorage();
            init();
        }

        // 6. Update LocalStorage
        function updateLocalStorage() {
            localStorage.setItem('transactions', JSON.stringify(transactions));
        }

        // 7. Update Chart
        function updateChart() {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            const expenses = transactions.filter(t => t.amount < 0);
            
            // Group by category
            const categories = {};
            expenses.forEach(t => {
                categories[t.category] = (categories[t.category] || 0) + Math.abs(t.amount);
            });

            const labels = Object.keys(categories);
            const data = Object.values(categories);

            // Toggle empty message
            if (labels.length === 0) {
                document.getElementById('expenseChart').style.display = 'none';
                chartEmptyMsg.style.display = 'block';
                if(expenseChartInstance) {
                    expenseChartInstance.destroy();
                    expenseChartInstance = null;
                }
                return;
            } else {
                document.getElementById('expenseChart').style.display = 'block';
                chartEmptyMsg.style.display = 'none';
            }

            if (expenseChartInstance) {
                expenseChartInstance.destroy();
            }

            expenseChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Расходы',
                        data: data,
                        backgroundColor: [
                            '#ef4444', '#f97316', '#f59e0b', '#10b981', 
                            '#3b82f6', '#6366f1', '#8b5cf6', '#ec4899'
                        ],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { usePointStyle: true, boxWidth: 10 } }
                    },
                    cutout: '70%'
                }
            });
        }

        // 8. Init App
        function init() {
            listEl.innerHTML = '';
            transactions.forEach(addTransactionDOM);
            updateValues();
            updateChart();
        }

        // --- EVENT LISTENERS ---
        formEl.addEventListener('submit', addTransaction);

        // Start
        init();
    </script>
</body>
</html>
